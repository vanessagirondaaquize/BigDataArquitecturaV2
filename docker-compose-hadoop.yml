version: '3' 
services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop2.7.4-java8
    container_name: namenode
    volumes:
      - /tmp/hdfs/namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop-hive.env
    ports:
      - "50080:50070"
    networks:
      net_pet:
        ipv4_address: 172.27.1.5
  
  datanode:
    build: ./datanode/
    container_name: datanode
    volumes:
      - /tmp/hdfs/datanode:/hadoop/dfs/data
      - ./bank:/bank
      - ./datanode:/datanode
    env_file:
      - ./hadoop-hive.env
    #command: sh -c "cp -R /datanode/sqoop/ /usr/local/"
    environment:
      SERVICE_PRECONDITION: "namenode:50070"
    depends_on:
      - namenode
    ports:
      - "50075:50075"
    networks:
      net_pet:
        ipv4_address: 172.27.1.6
    #entrypoint: ["sh", "-c", "cp -R /datanode/sqoop/ /usr/local/ && exec /entrypoint.sh"]

  
  datanode2:
    build: ./datanode/
    container_name: datanode2
    volumes:
      - /tmp/hdfs/datanode2:/hadoop/dfs/data
      - ./bank:/bank
      - ./datanode:/datanode
    env_file:
      - ./hadoop-hive.env
    environment:
      SERVICE_PRECONDITION: "namenode:50070"
    depends_on:
      - namenode
    ports:
      - "50076:50075"
    networks:
      net_pet:
        ipv4_address: 172.27.1.13

  mysql:
    build: ./mysql/
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=retail_db
    ports:
      - '3310:3306'
    volumes: 
      - ./mysqldata:/mysql/data
    env_file: 
      - ./mysql/variables.env
    networks:
      net_pet:
        ipv4_address: 172.27.1.15


  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      net_pet:
        ipv4_address: 172.27.1.50


networks:
  net_pet:
    ipam:
      driver: default
      config:
        - subnet: 172.27.0.0/16
